<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="804호 캘린더">
<title>804호 캘린더</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  :root{
    --bg:#FBF7EC;
    --surface:#FFFFFF;
    --surface-2:#FAF5E8;
    --ink:#4A3C2E;
    --ink-soft:#8A7A63;
    --ink-faint:#B3A68E;
    --border:#EDE3CC;
    --accent:#2F7A6E;
    --accent-soft:#DCECE8;
    --sunday:#D65C4A;
    --sunday-soft:#FBE7E3;
    --cat-child:#D9678F;      --cat-child-soft:#F8DFE8;   --cat-child-text:#8A3A5A;
    --cat-husband:#3E7CB8;    --cat-husband-soft:#DBEAF6; --cat-husband-text:#2C5478;
    --cat-me:#C9971E;         --cat-me-soft:#F7ECC9;      --cat-me-text:#7A5C12;
    --cat-family:#3F8F72;     --cat-family-soft:#DDF0E7;  --cat-family-text:#286048;
    --cat-event:#7A5AA0;      --cat-event-soft:#EBE3F4;   --cat-event-text:#503A6C;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow:0 2px 10px rgba(74,60,46,0.06), 0 1px 2px rgba(74,60,46,0.05);
    --shadow-lift:0 10px 30px rgba(74,60,46,0.16);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'PretendardVariable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--ink);
    overscroll-behavior-y:none;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{max-width:520px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; padding-bottom:84px;}

  /* Header */
  .topbar{
    padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{display:flex; align-items:center; gap:8px;}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft);}
  .brand-title{font-size:15px; font-weight:700; letter-spacing:-0.2px; color:var(--ink);}
  .today-btn{
    font-size:12.5px; font-weight:600; color:var(--accent); background:var(--accent-soft);
    border:none; padding:6px 12px; border-radius:999px; cursor:pointer;
  }

  /* Tabs */
  .tabs{display:flex; gap:6px; padding:0 18px 12px; }
  .tab-btn{
    flex:1; text-align:center; padding:9px 0; border-radius:999px; border:none;
    background:transparent; color:var(--ink-soft); font-size:14px; font-weight:600; cursor:pointer;
  }
  .tab-btn.active{background:var(--surface); color:var(--ink); box-shadow:var(--shadow);}

  .view{display:none; padding:0 14px;}
  .view.active{display:block;}

  /* Month nav */
  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 4px 14px;
  }
  .month-nav .month-label{font-size:19px; font-weight:800; letter-spacing:-0.3px;}
  .month-nav .nav-arrows{display:flex; gap:4px;}
  .nav-arrows button{
    width:32px;height:32px;border-radius:50%; border:1px solid var(--border); background:var(--surface);
    color:var(--ink-soft); font-size:15px; cursor:pointer; display:flex;align-items:center;justify-content:center;
  }

  /* Calendar */
  .weekday-row{display:grid; grid-template-columns:repeat(7,1fr); padding:0 4px 6px;}
  .weekday-row div{text-align:center; font-size:11.5px; font-weight:700; color:var(--ink-faint);}
  .weekday-row div.sun{color:var(--sunday);}

  .cal-grid{
    background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow);
    padding:6px 4px 8px; position:relative;
  }
  .cal-week{display:grid; grid-template-columns:repeat(7,1fr); position:relative;}
  .cal-day{
    min-height:64px; padding:4px 3px 3px; border-radius:10px; position:relative; cursor:pointer;
    text-align:center;
  }
  .cal-day:active{background:var(--surface-2);}
  .cal-day .dnum{
    font-size:12.5px; font-weight:600; color:var(--ink); width:22px;height:22px; display:flex;
    align-items:center; justify-content:center; border-radius:50%; margin:0 auto;
  }
  .cal-day.outside .dnum{color:var(--ink-faint); opacity:.55;}
  .cal-day.sun .dnum, .cal-day.holiday .dnum{color:var(--sunday);}
  .cal-day.today .dnum{background:var(--accent); color:#fff;}
  .cal-day .hname{font-size:8.5px; color:var(--sunday); font-weight:600; line-height:1.1; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:center;}
  .cal-day .dots{display:flex; gap:2px; margin-top:3px; flex-wrap:wrap; justify-content:center;}
  .cal-day .dots span{width:5px;height:5px;border-radius:50%;}
  .cal-day .more{font-size:8.5px; color:var(--ink-faint); margin-top:1px; text-align:center;}

  .bar-layer{position:absolute; left:0; right:0; top:24px; pointer-events:none;}
  .bar{
    position:absolute; height:20px; border-radius:8px; font-size:9.5px; font-weight:700;
    display:flex; align-items:center; padding:0 6px; overflow:hidden; pointer-events:auto; cursor:pointer;
  }
  .bar .bar-dot{width:5px;height:5px;border-radius:50%; flex-shrink:0; margin-right:4px;}
  .bar .bar-label{
    min-width:0; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .bar.cont-l{border-top-left-radius:0; border-bottom-left-radius:0; padding-left:4px;}
  .bar.cont-r{border-top-right-radius:0; border-bottom-right-radius:0;}

  /* Legend */
  .legend{display:flex; flex-wrap:wrap; gap:8px 14px; padding:16px 6px 6px;}
  .legend-item{display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--ink-soft); font-weight:600;}
  .legend-item .sw{width:8px;height:8px;border-radius:50%;}

  /* Upcoming list */
  .section-title{font-size:13px; font-weight:700; color:var(--ink-soft); margin:22px 6px 10px;}
  .agenda-item{
    background:var(--surface); border-radius:var(--radius-md); padding:11px 13px; margin-bottom:8px;
    display:flex; gap:10px; align-items:flex-start; box-shadow:var(--shadow); cursor:pointer;
  }
  .agenda-date{
    min-width:38px; text-align:center; font-size:11px; color:var(--ink-soft); font-weight:700; padding-top:1px;
  }
  .agenda-date .dow{font-size:9.5px; font-weight:600; color:var(--ink-faint);}
  .agenda-bar{width:4px; border-radius:3px; align-self:stretch;}
  .agenda-body{flex:1; min-width:0;}
  .agenda-title{font-size:13.5px; font-weight:700; color:var(--ink);}
  .agenda-sub{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
  .empty-note{text-align:center; color:var(--ink-faint); font-size:12.5px; padding:26px 0;}

  .swipe-wrap{position:relative; overflow:hidden; border-radius:var(--radius-md); margin-bottom:8px;}
  .swipe-del-action{
    position:absolute; top:0; right:0; bottom:0; width:76px; background:var(--sunday); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; border:none; cursor:pointer;
  }
  .swipe-wrap .agenda-item{
    position:relative; margin-bottom:0; background:var(--surface); transition:transform .18s ease; will-change:transform;
    touch-action:pan-y;
  }

  /* FAB */
  .fab{
    position:fixed; right:calc(50% - 260px + 20px); bottom:calc(24px + env(safe-area-inset-bottom));
    width:54px;height:54px;border-radius:50%; background:var(--accent); color:#fff; border:none;
    font-size:26px; box-shadow:var(--shadow-lift); cursor:pointer; z-index:40;
    display:flex;align-items:center;justify-content:center; line-height:0;
  }
  @media (max-width:560px){ .fab{right:20px;} }

  /* Modal / sheet */
  .overlay{
    position:fixed; inset:0; background:rgba(50,40,28,0.4); z-index:100; display:none;
    align-items:flex-end; justify-content:center;
  }
  .overlay.show{display:flex;}
  #confirmOverlay{ z-index:200; }
  .sheet{
    width:100%; max-width:520px; background:var(--surface); border-radius:22px 22px 0 0;
    padding:10px 20px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
    -webkit-overflow-scrolling:touch; animation:slideup .22s ease; position:relative;
  }
  @keyframes slideup{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet-handle{width:36px;height:4px;background:var(--border); border-radius:3px; margin:6px auto 14px;}
  .sheet-close{
    position:absolute; top:14px; right:16px; width:30px;height:30px; border-radius:50%;
    background:var(--surface-2); border:none; color:var(--ink-soft); font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; z-index:2;
  }
  .sheet-title{font-size:16.5px; font-weight:800; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:6px;}
  .field input[type=text], .field input[type=date], .field input[type=time], .field textarea{
    width:100%; border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px;
    font-size:14.5px; font-family:inherit; background:var(--surface-2); color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:58px;}
  .cat-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .cat-chip{
    display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:999px; border:1.5px solid var(--border);
    font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; background:var(--surface-2);
  }
  .cat-chip .sw{width:8px;height:8px;border-radius:50%;}
  .cat-chip.sel{border-color:currentColor; background:#fff; box-shadow:var(--shadow);}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .checkline{display:flex; align-items:center; gap:8px; margin-bottom:14px;}
  .checkline input{width:17px;height:17px;}
  .checkline label{font-size:13px; font-weight:600; color:var(--ink-soft);}
  .sheet-actions{display:flex; gap:10px; margin-top:6px;}
  .btn{
    flex:1; padding:12px; border-radius:var(--radius-sm); border:none; font-size:14px; font-weight:700; cursor:pointer;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-ghost{background:var(--surface-2); color:var(--ink-soft);}
  .btn-danger{background:var(--sunday); color:#fff;}

  .daylist-item{
    display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--border);
  }
  .daylist-item:last-child{border-bottom:none;}
  .daylist-item .sw{width:9px;height:9px;border-radius:50%; flex-shrink:0;}
  .daylist-item .info{flex:1; min-width:0;}
  .daylist-item .t{font-size:13.5px; font-weight:700;}
  .daylist-item .m{font-size:11.5px; color:var(--ink-soft); margin-top:1px;}
  .daylist-item .edit{font-size:11.5px; color:var(--accent); font-weight:700; cursor:pointer; padding:4px 8px;}

  /* Memo tab */
  .add-group-bar{display:flex; gap:8px; margin-bottom:16px;}
  .add-group-bar input{
    flex:1; border:1px solid var(--border); border-radius:999px; padding:9px 14px; font-size:13px;
    background:var(--surface); font-family:inherit;
  }
  .add-group-bar button{
    background:var(--accent); color:#fff; border:none; border-radius:999px; padding:0 16px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .group-card{background:var(--surface); border-radius:var(--radius-md); box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden;}
  .group-head{display:flex; align-items:center; justify-content:space-between; padding:13px 14px 10px;}
  .group-head .gname{font-size:14px; font-weight:800;}
  .group-head .gcount{font-size:11px; color:var(--ink-faint); font-weight:600; margin-left:6px;}
  .group-head .gdel{color:var(--ink-faint); font-size:16px; cursor:pointer; padding:2px 6px;}
  .item-row{display:flex; align-items:center; gap:9px; padding:8px 14px; border-top:1px solid var(--border);}
  .item-row input[type=checkbox]{width:18px;height:18px; accent-color:var(--accent); flex-shrink:0;}
  .item-row .itext{flex:1; font-size:13.5px; min-width:0;}
  .item-row .itext.done{text-decoration:line-through; color:var(--ink-faint);}
  .item-row .idue{font-size:10.5px; color:var(--sunday); font-weight:700; background:var(--sunday-soft); padding:2px 6px; border-radius:6px; flex-shrink:0;}
  .item-row .idel{color:var(--ink-faint); font-size:15px; cursor:pointer; padding:2px 4px; flex-shrink:0;}
  .add-item-row{display:flex; gap:8px; padding:9px 14px 13px; border-top:1px solid var(--border);}
  .add-item-row input[type=text]{
    flex:1; border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:13px; background:var(--surface-2); font-family:inherit;
  }
  .add-item-row input[type=date]{
    width:120px; border:1px solid var(--border); border-radius:8px; padding:7px 8px; font-size:11.5px; background:var(--surface-2); font-family:inherit;
  }
  .add-item-row button{background:var(--accent-soft); color:var(--accent); border:none; border-radius:8px; padding:0 12px; font-weight:700; font-size:13px; cursor:pointer;}

  .toast{
    position:fixed; bottom:calc(90px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:9px 16px; border-radius:999px; font-size:12.5px; z-index:200;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .toast.show{opacity:1;}

  /* Travel tab */
  .trip-chips{display:flex; gap:8px; overflow-x:auto; padding:10px 2px 18px; -webkit-overflow-scrolling:touch;}
  .trip-chips::-webkit-scrollbar{display:none;}
  .trip-chip{flex-shrink:0; padding:9px 15px; border-radius:999px; background:var(--surface); color:var(--ink-soft);
    font-size:13px; font-weight:700; box-shadow:var(--shadow); cursor:pointer; white-space:nowrap; border:none;}
  .trip-chip.active{background:var(--accent); color:#fff; box-shadow:none;}
  .trip-chip.add{background:var(--accent-soft); color:var(--accent);}
  .trip-header{display:flex; align-items:flex-start; justify-content:space-between; background:var(--surface);
    border-radius:var(--radius-md); padding:15px 16px; box-shadow:var(--shadow); margin-bottom:4px;}
  .trip-name{font-size:16.5px; font-weight:800;}
  .trip-dates{font-size:12px; color:var(--ink-soft); margin-top:4px; font-weight:600;}
  .trip-edit{font-size:12px; color:var(--accent); font-weight:700; cursor:pointer; padding:4px 8px; flex-shrink:0;}

  .sched-row{display:flex; align-items:center; gap:9px; padding:9px 14px; border-top:1px solid var(--border);}
  .sched-row .sdate{font-size:10.5px; font-weight:700; color:var(--accent); background:var(--accent-soft);
    padding:4px 7px; border-radius:6px; flex-shrink:0; text-align:center;}
  .sched-row .stext{flex:1; font-size:13.5px; min-width:0;}
  .sched-row .idel{color:var(--ink-faint); font-size:15px; cursor:pointer; padding:2px 4px; flex-shrink:0;}
  .add-sched-row{padding:10px 14px 13px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:7px;}
  .add-sched-row .srow{display:flex; gap:7px;}
  .add-sched-row input[type=text]{flex:1; min-width:0; border:1px solid var(--border); border-radius:8px; padding:7px 10px;
    font-size:12.5px; background:var(--surface-2); font-family:inherit;}
  .add-sched-row input[type=date]{width:112px; border:1px solid var(--border); border-radius:8px; padding:7px 6px;
    font-size:11px; background:var(--surface-2); font-family:inherit; flex-shrink:0;}
  .add-sched-row input[type=time]{width:80px; border:1px solid var(--border); border-radius:8px; padding:7px 6px;
    font-size:11px; background:var(--surface-2); font-family:inherit; flex-shrink:0;}
  .add-sched-row button{background:var(--accent-soft); color:var(--accent); border:none; border-radius:8px;
    padding:8px 12px; font-weight:700; font-size:13px; cursor:pointer; align-self:flex-end;}

  .link-row{display:flex; align-items:center; gap:9px; padding:10px 14px; border-top:1px solid var(--border);}
  .link-row .ltitle{flex:1; min-width:0; text-decoration:none; display:block;}
  .link-row .lt{font-size:13.5px; font-weight:700; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .link-row .lu{font-size:10.5px; color:var(--ink-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px;}
  .link-row .idel{color:var(--ink-faint); font-size:15px; cursor:pointer; padding:2px 4px; flex-shrink:0;}
  .add-link-row{padding:10px 14px 13px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:7px;}
  .add-link-row input{border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:12.5px;
    background:var(--surface-2); font-family:inherit;}
  .add-link-row button{background:var(--accent-soft); color:var(--accent); border:none; border-radius:8px;
    padding:8px 12px; font-weight:700; font-size:13px; cursor:pointer; align-self:flex-end;}

  .setup-note{
    margin:14px 6px; padding:12px 14px; background:#FFF7E8; border:1px solid #F0DFB0; border-radius:12px;
    font-size:12px; color:#7A5B12; line-height:1.5; display:none;
  }
  .setup-note.show{display:block;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><span class="brand-dot"></span><span class="brand-title">804호 캘린더</span></div>
    <button class="today-btn" id="todayBtn">오늘</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-view="calendar">캘린더</button>
    <button class="tab-btn" data-view="memo">메모</button>
    <button class="tab-btn" data-view="travel">여행</button>
  </div>

  <div id="setupNote" class="setup-note">Firebase 설정이 비어있어요. 코드 상단의 firebaseConfig 값을 본인의 Firebase 프로젝트 정보로 채워주세요. (안내는 대화창 메시지 참고)</div>

  <!-- CALENDAR VIEW -->
  <div class="view active" id="view-calendar">
    <div class="month-nav">
      <div class="month-label" id="monthLabel">2026년 7월</div>
      <div class="nav-arrows">
        <button id="prevMonth">‹</button>
        <button id="nextMonth">›</button>
      </div>
    </div>
    <div class="weekday-row">
      <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>

    <div class="legend">
      <div class="legend-item"><span class="sw" style="background:var(--cat-husband)"></span>남편</div>
      <div class="legend-item"><span class="sw" style="background:var(--cat-me)"></span>아내</div>
      <div class="legend-item"><span class="sw" style="background:var(--cat-child)"></span>가을/겨울</div>
      <div class="legend-item"><span class="sw" style="background:var(--cat-family)"></span>공동</div>
      <div class="legend-item"><span class="sw" style="background:var(--cat-event)"></span>경조사</div>
    </div>

    <div class="section-title">다가오는 일정</div>
    <div id="agendaList"></div>
  </div>

  <!-- MEMO VIEW -->
  <div class="view" id="view-memo">
    <div class="section-title" style="margin-top:16px;">새 목록 만들기</div>
    <div class="add-group-bar">
      <input type="text" id="newGroupInput" placeholder="예: 다이소 장바구니">
      <button id="addGroupBtn">추가</button>
    </div>
    <div id="groupsWrap"></div>
  </div>

  <!-- TRAVEL VIEW -->
  <div class="view" id="view-travel">
    <div class="trip-chips" id="tripChips"></div>
    <div id="tripEmpty" class="empty-note" style="display:none;">아직 만든 여행이 없어요.<br>오른쪽 아래 + 버튼으로 새 여행을 추가해보세요.</div>
    <div id="tripDetail" style="display:none;">
      <div class="trip-header">
        <div>
          <div class="trip-name" id="tripName">제주도 여행</div>
          <div class="trip-dates" id="tripDates">7/25 ~ 7/28</div>
        </div>
        <div class="trip-edit" id="tripEditBtn">수정</div>
      </div>

/* ============ 3) 유틸 ============ */
function pad(n){ return String(n).padStart(2,'0'); }
function fmt(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function isSameDay(a,b){ return fmt(a)===fmt(b); }
const DOW = ['일','월','화','수','목','금','토'];

function getMonthMatrix(year, month){ // month: 0-11
  const first = new Date(year, month, 1);
  const startOffset = first.getDay(); // 0=Sun
  const gridStart = addDays(first, -startOffset);
  const weeks = [];
  let cursor = gridStart;
  for(let w=0; w<6; w++){
    const week = [];
    for(let i=0;i<7;i++){ week.push(cursor); cursor = addDays(cursor,1); }
    weeks.push(week);
    if(cursor > first && cursor.getMonth() !== month && w>=4) break; // trim trailing empty week when possible
  }
  return weeks;
}

  db.collection('checklistGroups').orderBy('order').onSnapshot(snap=>{

  db.collection('trips').orderBy('order').onSnapshot(snap=>{

  }else{
    if(ev.id){ const idx=events.findIndex(e=>e.id===ev.id); events[idx]={...ev}; }
    else{ ev.id='local'+Date.now(); events.push(ev); }
    renderCalendar(); renderAgenda();

/* ============ 6) 캘린더 렌더 ============ */
function renderCalendar(){
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  document.getElementById('monthLabel').textContent = `${y}년 ${m+1}월`;
  const weeks = getMonthMatrix(y,m);
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const today = new Date();

  weeks.forEach(week=>{
    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week';

    const dayCells = [];
    week.forEach((d)=>{
      const ds = fmt(d);
      const outside = d.getMonth() !== m;
      const isSun = d.getDay()===0;
      const holidayName = HOLIDAYS[ds];
      const cell = document.createElement('div');
      cell.className = 'cal-day' + (outside?' outside':'') + (isSun?' sun':'') + (holidayName?' holiday':'') + (isSameDay(d,today)?' today':'');
      cell.innerHTML = `<div class="dnum">${d.getDate()}</div>${holidayName?`<div class="hname">${holidayName}</div>`:''}`;
      cell.addEventListener('click', ()=> openDaySheet(ds));
      weekEl.appendChild(cell);
      dayCells.push(cell);
    });

    grid.appendChild(weekEl);

    // multi/single day event bars for this week
    const MAX_LANES = 5;
    const LANE_H = 23;
    const weekStart = week[0], weekEnd = week[6];
    const weekEvents = events.filter(e=>{
      const s = parseDate(e.start), en = parseDate(e.end||e.start);
      return en >= weekStart && s <= weekEnd;
    }).sort((a,b)=>{
      const lenA = (parseDate(a.end||a.start)-parseDate(a.start));
      const lenB = (parseDate(b.end||b.start)-parseDate(b.start));
      return parseDate(a.start)-parseDate(b.start) || lenB-lenA;
    });

    const lanes = []; // each lane: array of {startIdx,endIdx}
    const placed = [];
    weekEvents.forEach(e=>{
      const s = parseDate(e.start), en = parseDate(e.end||e.start);
      let startIdx = week.findIndex(d=>isSameDay(d,s));
      let endIdx = week.findIndex(d=>isSameDay(d,en));
      if(startIdx===-1) startIdx = 0;
      if(endIdx===-1) endIdx = 6;
      let lane = 0;
      while(lanes[lane] && lanes[lane].some(r=> !(endIdx < r.s || startIdx > r.e))) lane++;
      if(!lanes[lane]) lanes[lane]=[];
      lanes[lane].push({s:startIdx,e:endIdx});
      if(lane < MAX_LANES) placed.push({e, startIdx, endIdx, lane, contL: s < weekStart, contR: en > weekEnd});
    });

    if(placed.length){
      const barLayer = document.createElement('div');
      barLayer.className = 'bar-layer';
      barLayer.style.height = (Math.min(MAX_LANES, lanes.length)*LANE_H) + 'px';
      placed.forEach(p=>{
        const info = catInfo(p.e.category);
        const bar = document.createElement('div');
        bar.className = 'bar' + (p.contL?' cont-l':'') + (p.contR?' cont-r':'');
        bar.style.left = `calc(${(p.startIdx/7)*100}% + ${p.contL?0:2}px)`;
        bar.style.width = `calc(${((p.endIdx-p.startIdx+1)/7)*100}% - ${(p.contL?0:2)+(p.contR?0:2)}px)`;
        bar.style.top = (p.lane*LANE_H)+'px';
        bar.style.background = info.soft;
        bar.style.color = info.text;
        // 여러 주에 걸쳐 이어지는 일정도 새로 시작되는 줄마다 제목을 다시 보여줘서
        // (예: 7/26부터 새 줄이 시작되면 그 줄에서도 "제주도 여행"이 다시 보임)
        // 어느 줄을 보든 무슨 일정인지 바로 알 수 있게 함
        {
          const dot = document.createElement('span');
          dot.className = 'bar-dot';
          dot.style.background = info.hex;
          bar.appendChild(dot);
          const label = document.createElement('span');
          label.className = 'bar-label';
          label.textContent = p.e.title;
          bar.appendChild(label);
        }
        bar.addEventListener('click',(ev)=>{ ev.stopPropagation(); openEventSheet(p.e); });
        barLayer.appendChild(bar);
      });
      weekEl.style.position='relative';
      weekEl.appendChild(barLayer);
      weekEl.style.paddingBottom = (Math.min(MAX_LANES, lanes.length)*LANE_H + 12) + 'px';

      // 요일별로 안 보이는 일정 개수를 정확히 계산해서 그 날짜 칸에 "+N" 표시
      for(let dayIdx=0; dayIdx<7; dayIdx++){
        const totalForDay = weekEvents.filter(e=>{
          const s = parseDate(e.start), en = parseDate(e.end||e.start);
          return en >= week[dayIdx] && s <= week[dayIdx];
        }).length;
        const visibleForDay = placed.filter(p=> dayIdx>=p.startIdx && dayIdx<=p.endIdx).length;
        const hidden = totalForDay - visibleForDay;
        if(hidden > 0){
          const moreEl = document.createElement('div');
          moreEl.className = 'more';
          moreEl.textContent = `+${hidden}`;
          moreEl.style.marginTop = (Math.min(MAX_LANES, lanes.length)*LANE_H + 2) + 'px';
          dayCells[dayIdx].appendChild(moreEl);
        }
      }
    }
  });
}

/* 좌우 스와이프로 삭제 버튼을 드러내는 공용 제스처 핸들러.
   가로 드래그가 거의 없으면 탭으로 간주해 onTap을 실행. */
function attachSwipeToReveal(el, onTap){
  const MAX = -76;
  let startX=0, startY=0, baseX=0, dragging=false, decided=false, horizontal=false, suppressClick=false;

  el.addEventListener('touchstart', (e)=>{
    if(e.touches.length!==1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    baseX = parseFloat(el.dataset.tx || '0');
    dragging = true; decided = false; horizontal = false;
  }, {passive:true});

  el.addEventListener('touchmove', (e)=>{
    if(!dragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(!decided && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
      decided = true;
      horizontal = Math.abs(dx) > Math.abs(dy);
    }
    if(horizontal){
      e.preventDefault();
      let tx = baseX + dx;
      tx = Math.max(MAX, Math.min(0, tx));
      el.style.transform = `translateX(${tx}px)`;
      el.dataset.tx = tx;
    }
  }, {passive:false});

  el.addEventListener('touchend', ()=>{
    if(!dragging) return;
    dragging = false;
    if(!horizontal) return;
    suppressClick = true;
    const tx = parseFloat(el.dataset.tx || '0');
    const open = tx < MAX/2;
    el.style.transform = `translateX(${open?MAX:0}px)`;
    el.dataset.tx = open?MAX:0;
  });

  el.addEventListener('click', ()=>{
    if(suppressClick){ suppressClick=false; return; }
    const tx = parseFloat(el.dataset.tx || '0');
    if(tx < -5){ el.style.transform='translateX(0)'; el.dataset.tx=0; return; }
    onTap();
  });
}

/* 달력 좌우 스와이프로 월 이동 */
(function(){
  const grid = document.getElementById('calGrid');
  let touchStartX = 0, touchStartY = 0, touching = false;
  grid.addEventListener('touchstart', (e)=>{
    if(e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touching = true;
  }, {passive:true});
  grid.addEventListener('touchend', (e)=>{
    if(!touching) return;
    touching = false;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0){ viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1); }
      else{ viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1); }
      renderCalendar();
    }
  }, {passive:true});
})();
document.getElementById('todayBtn').addEventListener('click', ()=>{ viewDate = new Date(); renderCalendar(); });

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
  });
});

document.getElementById('fabAdd').addEventListener('click', ()=>{
  const activeView = document.querySelector('.view.active').id;
  if(activeView==='view-calendar'){ openEventSheet(null, fmt(new Date())); }
  else if(activeView==='view-travel'){ openTripSheet(null); }
  else{ document.getElementById('newGroupInput').focus(); }
});

function renderAll(){ renderCalendar(); renderAgenda(); renderGroups(); renderTrips(); }

subscribe();
</script>
</body>
</html>
